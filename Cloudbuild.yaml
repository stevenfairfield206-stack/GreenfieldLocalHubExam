options:
  logging: CLOUD_LOGGING_ONLY

steps:

  # Step 1: Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/greenfieldlocalhubexam:$COMMIT_SHA', '.']

  # Step 2: Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/greenfieldlocalhubexam:$COMMIT_SHA']

  # Step 3: Deploy the new image to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'greenfieldlocalhubexam'
      - '--image'
      - 'gcr.io/$PROJECT_ID/greenfieldlocalhubexam:$COMMIT_SHA'
      - '--region'
      - 'europe-west2'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

  # (Optional) Step 4: Verify deployment status
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'services'
      - 'describe'
      - 'greenfieldlocalhubexam'
      - '--region'
      - 'europe-west2'
      - '--format'
      - 'value(status.conditions[0].status)'

  # ... (Your existing validation and .NET build steps can remain here if needed) ...

images:
  - 'gcr.io/$PROJECT_ID/greenfieldlocalhubexam:$COMMIT_SHA'

  # Step 1: Checkout is automatic in Cloud Build, but we can list files
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        ls -R

  # Step 2: Validate HTML files
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if ls *.html >/dev/null 2>&1; then
          echo "HTML files detected"
          echo "Basic HTML validation passed"
        else
          echo "No HTML files found"
        fi

  # Step 3: CSS validation checks   
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if ls *.css >/dev/null 2>&1; then
          echo "CSS files detected"
          echo "Basic CSS validation passed"
        else
          echo "No CSS files found"
        fi
        
  # Step 4: Validate JavaScript files
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if ls *.js >/dev/null 2>&1; then
          echo "JavaScript files detected"
          echo "Basic JS validation passed"
        else
          echo "No JavaScript files found"
        fi
        
  # Step 5: Build .NET Solution
  - name: 'mcr.microsoft.com/dotnet/sdk:8.0'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        if ls *.sln >/dev/null 2>&1; then
          dotnet restore
          dotnet build --configuration Release --no-restore
        else
          echo "No .sln file found – skipping .NET build"
        fi

# Note: Cloud Build handles artifacts differently than GitHub. 
# This will upload the entire workspace to a GCS bucket.
artifacts:
  objects:
    location: 'gs://glhbucket/build-artifacts/'
    paths: ['**']
